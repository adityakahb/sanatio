  <head>
      <meta charset="utf-8">
      <meta charset="utf-8" />
      <meta name="format-detection" content="telephone=yes" />
      <meta http-equiv="cleartype" content="on" />
      <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
      <meta http-equiv="content-type" content="text/html; charset=UTF-8">

  </head>
  <body>
    <form data-sanatio id="form1" action="/">
      <div class="form-group">
        <label for="text1_form1">Form 1 Text 1</label>
        <input type="text" name="text1_form1" id="text1_form1" placeholder="text1_form1"
          data-sanatio-required="true"
          data-sanatio-required-type="error"
          data-sanatio-required-message="This is required"
        >
      </div>
      
      <div class="form-group">
        <label for="password1_form1">Form 1 Password 1</label>
        <input type="password" name="password1_form1" id="password1_form1" placeholder="password1_form1"
          data-sanatio-required="true"
          data-sanatio-required-type="error"
          data-sanatio-required-message="This is required"
          data-sanatio-pattern="^(?=.*?[A-Z])(?=.*?[a-z])(?=.*?[0-9])(?=.*?[#?!@$%^&*-]).{8,}$"
          data-sanatio-pattern-type="warning"
          data-sanatio-pattern-message="Invalid Pattern"
        >
      </div>
      
      <div class="form-group">
        <label for="email1_form1">Form 1 email 1</label>
        <input type="email" name="email1_form1" id="email1_form1" placeholder="email1_form1"
          data-sanatio-required="true"
          data-sanatio-required-type="error"
          data-sanatio-required-message="This is required"
          data-sanatio-email="true"
          data-sanatio-email-type="error"
          data-sanatio-email-message="Invalid Email"
        >
      </div>
      
      <div class="form-group">
        <label for="url1_form1">Form 1 url 1</label>
        <input type="email" name="url1_form1" id="url1_form1" placeholder="url1_form1"
          data-sanatio-url="true"
          data-sanatio-url-type="warning"
          data-sanatio-url-message="Invalid URL"
        >
      </div>
      
      <div class="form-group">
        <label for="checkbox1_form1">
        <input type="checkbox" name="checkbox1_form1" id="checkbox1_form1"
          data-sanatio-required="true"
          data-sanatio-required-type="warning"
          data-sanatio-required-message="Invalid URL"
        >
        Form 1 checkbox 1</label>
      </div>
      
      <div class="form-group">
        <label for="checkbox2_form1">
        <input type="checkbox" name="checkbox2_form1" id="checkbox2_form1"
          data-sanatio-required="true"
          data-sanatio-required-type="error"
          data-sanatio-required-message="This is required"
        >
        Form 1 checkbox 2</label>
        <label for="checkbox3_form1">
        <input type="checkbox" name="checkbox2_form1" id="checkbox3_form1"
        >
        Form 1 checkbox 3</label>
      </div>
      
      <div class="form-group">
        <select name="single_select" id="single_select"
        data-sanatio-required="true"
        data-sanatio-required-type="error"
        data-sanatio-required-message="This is required"
        >
          <option value="">Select One</option>
          <option value="1">Option 1</option>
          <option value="2">Option 2</option>
          <option value="3">Option 3</option>
          <option value="4">Option 4</option>
          <option value="5">Option 5</option>
          <option value="6">Option 6</option>
          <option value="7">Option 7</option>
          <option value="8">Option 8</option>
        </select>
      </div>
      
      <div class="form-group">
        <select name="multiple_select" id="multiple_select" multiple="multiple"
        data-sanatio-required="true"
        data-sanatio-required-type="error"
        data-sanatio-required-message="This is required"
        >
          <option value="">Select Multiple</option>
          <option value="1">Option 1</option>
          <option value="2">Option 2</option>
          <option value="3">Option 3</option>
          <option value="4">Option 4</option>
          <option value="5">Option 5</option>
          <option value="6">Option 6</option>
          <option value="7">Option 7</option>
          <option value="8">Option 8</option>
        </select>
      </div>
      <div class="form-group">
        <input type="submit" value="Submit" title="Submit"/>
      </div>
    </form>
    <form data-sanatio id="form2" action="/">
      <!--<input type="text" name="text1_form2" id="text1_form2" placeholder="text1_form2"
        data-sanatio-required="true"
        data-sanatio-required-type="error"
        data-sanatio-pattern="^(?=.*?[A-Z])(?=.*?[a-z])(?=.*?[0-9])(?=.*?[#?!@$%^&*-]).{8,}$"

        data-sanatio-minlength="6"
        data-sanatio-minlength-type="error"
      >

    <form id="form5" action="/">
      <label>Tryout</label>
      <input type="text" name="text2_form5" id="text2_form5" placeholder="text2_form5">
      <button type="submit">submit form 2</button>
    </form>
    <script src="../bower_components/jquery/dist/jquery.js"></script>
    <script src="../dev/sanatio.js"></script>
    <script>
    
    $.sanatio.addSanatioMethod('sample', function (element, value){
      return element.val() !== value;
    });
    
      var validatorObj = {
        'rulesConfig': [{
          'elementName': 'text2_form5',
          'rules': [
            {
              "type": "error",
              "name": "required",
              "value": true,
              "message": "This value is required from jquery initiate."
            },
            {
              "type": "error",
              "name": "minlength",
              "value": 6,
              "message": "minlength from jquery initiate."
            },
            {
              "type": "warning",
              "name": "sample",
              "value": "123456",
              "message": "This is added method error initiate."
            }
          ]
        }]
      };
      var initSanatioForm5 = $('#form5').sanatio(validatorObj);
    
    </script>
  </body>
