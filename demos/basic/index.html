<!DOCTYPE html>
<!--[if IE 9]>         <html lang="en_US" class="no-js lt-ie10" > <![endif]-->
<!--[if gt IE 9]><!-->
<html lang="en_US" class="no-js">
<!--<![endif]-->

  <head>
      <meta charset="utf-8">
      <meta charset="utf-8" />
      <meta name="format-detection" content="telephone=yes" />
      <meta http-equiv="cleartype" content="on" />
      <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
      <meta http-equiv="content-type" content="text/html; charset=UTF-8">
      <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
      <link href="../library/css/common/index.css" rel="stylesheet">
      <link href="../library/css/demos/basic/index.css" rel="stylesheet">
  </head>
  <body>
    <div class="page-wrap">
      <div class="content-wrapper header-wrapper">
        <div class="container">
          <div class="row">
            <div class="col-xs-12">
              <header>
                <h1>Sanatio Basic Implementation</h1>
              </header>
            </div>
          </div>
        </div>
      </div>
      <div class="content-wrapper main-wrapper">
        <div class="container">
          <div class="row">
            <div class="col-xs-12">
              <form data-sanatio id="form1" action="/">
                <label for="text1_form1">Text</label>
                <input type="text" name="text1_form1" id="text1_form1" placeholder="text"
                  data-sanatio-required="true"
                >
                <hr>
                <label for="password1_form1">Password</label>
                <input type="password" name="password1_form1" id="password1_form1" placeholder="password"
                  data-sanatio-required="true"
                  data-sanatio-capslock="true"
                  data-sanatio-pattern="^(?=.*?[A-Z])(?=.*?[a-z])(?=.*?[0-9])(?=.*?[#?!@$%^&*-]).{8,}$"
                  data-sanatio-pattern-type="warning"
                >
                <hr>
                <label for="password2_form1">Password</label>
                <input type="password" name="password2_form1" id="password2_form1" placeholder="retype password"
                  data-sanatio-required="true"
                  data-sanatio-equalthisto="password1_form1"
                  data-sanatio-equalthisto-type="warning"
                >
                <hr>
                <label for="email1_form1">Email</label>
                <input type="email" name="email1_form1" id="email1_form1" placeholder="Email"
                  data-sanatio-required="true"
                  data-sanatio-email="true"
                >
                <hr>
                <label for="url1_form1">Url</label>
                <input type="email" name="url1_form1" id="url1_form1" placeholder="Url"
                  data-sanatio-url="true"
                  data-sanatio-url-type="warning"
                >
                <hr>
                <label for="text2_form1">Only digits</label>
                <input type="text" name="text2_form1" id="text2_form1" placeholder="text"
                  data-sanatio-required="true"
                  data-sanatio-digits="true"
                  data-sanatio-rangevalue="[4000, 8000]"
                  data-sanatio-rangevalue-type="warning"
                >
                <hr>
                <label for="creditcard1_form1">Credit Card</label>
                <input type="tel" name="creditcard1_form1" id="creditcard1_form1" placeholder="Credit Card"
                  data-sanatio-required="true"
                  data-sanatio-creditcard="with-luhn"
                  data-sanatio-creditcard-formatter="-"
                >
                <hr>
                <label for="creditcard2_form1">Credit Card 2</label>
                <input type="tel" name="creditcard2_form1" id="creditcard2_form1" placeholder="Luhn Check"
                  data-sanatio-required="true"
                  data-sanatio-luhn="true"
                >
                <hr>
                <label for="date1_form1">Date</label>
                <input type="text" name="date1_form1" id="date1_form1" placeholder="Date in YYYY MM DD"
                  data-sanatio-required="true"
                  data-sanatio-date="true"
                  data-sanatio-dateformat="YYYY MM DD"
                  data-sanatio-dateformat-type="warning"
                >
                <hr>
                <label for="textarea1_form1">textarea</label>
                <textarea name="textarea1_form1" id="textarea1_form1" rows="8" cols="40"
                  data-sanatio-minlength="50"
                  data-sanatio-minlength-type="warning"
                ></textarea>
                <hr>
                <label for="checkbox1_form1">
                <input type="checkbox" name="checkbox1_form1" id="checkbox1_form1"
                  data-sanatio-required="true"
                >
                Single Checkbox</label>
                <hr>
                <label for="checkbox2_form1">
                <input type="checkbox" name="checkbox2_form1" id="checkbox2_form1"
                  data-sanatio-required="true"
                  data-sanatio-minlength='2'
                >
                Checkbox 1 in a Group</label><br>
                <label for="checkbox3_form1">
                <input type="checkbox" name="checkbox2_form1" id="checkbox3_form1"
                >
                Checkbox 2 in a Group</label><br>
                <label for="checkbox4_form1">
                <input type="checkbox" name="checkbox2_form1" id="checkbox4_form1"
                >
                Checkbox 3 in a Group</label>
                <hr>
                <label for="radio1_form1">
                <input type="radio" name="radio1_form1" id="radio1_form1"
                  data-sanatio-required="true"
                  data-sanatio-required-type="error"
                >
                Single Radio</label>
                <hr>
                <label for="radio2_form1">
                <input type="radio" name="radio2_form1" id="radio2_form1"
                  data-sanatio-required="true"
                >
                Radio 1 in a Group</label><br>
                <label for="radio3_form1">
                <input type="radio" name="radio2_form1" id="radio3_form1"
                >
                Radio 2 in a Group</label>
                <hr>
                <label for="single_select">Select Something</label><br>
                <select name="single_select" id="single_select"
                data-sanatio-required="true"
                >
                  <option value="">Select One</option>
                  <option value="1">Option 1</option>
                  <option value="2">Option 2</option>
                  <option value="3">Option 3</option>
                  <option value="4">Option 4</option>
                  <option value="5">Option 5</option>
                  <option value="6">Option 6</option>
                  <option value="7">Option 7</option>
                  <option value="8">Option 8</option>
                </select>
                <hr>
                <label for="single_select">Select Minimum 3 and Maximum 5</label><br>
                <select name="multiple_select" id="multiple_select" multiple="multiple"
                data-sanatio-required="true"
                data-sanatio-rangelength="[3, 5]"
                >
                  <option value="">Select Multiple</option>
                  <option value="1">Option 1</option>
                  <option value="2">Option 2</option>
                  <option value="3">Option 3</option>
                  <option value="4">Option 4</option>
                  <option value="5">Option 5</option>
                  <option value="6">Option 6</option>
                  <option value="7">Option 7</option>
                  <option value="8">Option 8</option>
                </select>
                <hr>
                <input type="submit" value="Submit" title="Submit"/>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <div class="container">
        <div class="row">
          <div class="col-xs-12">
            &copy; 2016 <a href="http://www.adityabhakay.com" title="Home">Aditya Bhakay</a>
          </div>
        </div>
      </div>
    </footer>
    <script src="../library/js/jquery.min.js"></script>
    <script src="../library/js/moment-with-locales.min.js"></script>
    <script src="../../dev/sanatio.js"></script>
    <script>
      $.sanatio.submitHandler = function (){
        alert('submitted');
        return false;
      };
    </script>
  </body>
</html>
