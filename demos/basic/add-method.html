    $.sanatio.submitHandler = function (){

      return false;

    $.sanatio.addSanatioRule('customrule', function (element, value){
      return parseInt(element.val()) !== parseInt(value);
    });
    var validatorObj = {
      'rulesConfig': [{
        'elementName': 'text1_form1',
        'rules': [
          {
            "name": "required",
            "value": "true"
          },
          {
            "name": "customrule",
            "value": "123456",
            "message": "Value does not match with 123456"
          }
        ]
      }]
    };
    var initSanatioForm5 = $('#form1').sanatio(validatorObj);
